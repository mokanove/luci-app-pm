name: "Do it yourself."

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk_name: "immortalwrt-sdk-25.12.0-rc1-x86-64_gcc-14.3.0_musl.Linux-x86_64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@main

      - name: Install Build Dependencies
        uses: mokanove/mokanove/actions/luci-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Clone Project source code & Get Version
        id: get_version
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}/package/
          git clone https://github.com/mokanove/luci-app-powermanager.git

          cd luci-app-powermanager
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build!
        shell: bash
        run: |
          cd ${{ matrix.sdk_name }}
          make package/luci-app-powermanager/compile V=s -j$(nproc)

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: ${{ matrix.sdk_name }}/bin/packages/**/*.apk
          body: |
            # 🚀 Release Notes
            ### ✨ Change Logs
            - **External Updates**:The content of the action and Makefile has been optimized.
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
